<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Produk - Admin BABA FARM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f261c 0%, #1B4332 50%, #0f261c 100%);
            min-height: 100vh;
            color: #fff;
            line-height: 1.6;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Poppins', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .sidebar-overlay.active {
            display: block;
            opacity: 1;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-logo {
            font-family: 'Poppins', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: #52B788;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .sidebar-user {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            background: rgba(82, 183, 136, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #52B788;
        }

        .user-info h4 {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .user-info p {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .sidebar-menu {
            padding: 1rem 0;
        }

        .menu-section {
            margin-bottom: 1.5rem;
        }

        .menu-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.4);
            padding: 0 1.5rem;
            margin-bottom: 0.5rem;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1.5rem;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: all 0.3s;
        }

        .menu-item:hover {
            background: rgba(82, 183, 136, 0.15);
            color: #52B788;
        }

        .menu-item.active {
            background: rgba(82, 183, 136, 0.2);
            color: #52B788;
            border-right: 3px solid #52B788;
        }

        .menu-item i {
            width: 20px;
            font-size: 0.9rem;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 260px;
        }

        /* Top Bar */
        .top-bar {
            padding: 1rem 2rem;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title h1 {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .top-bar-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 0.5rem 1rem;
        }

        .search-box input {
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            width: 200px;
        }

        .search-box input:focus {
            outline: none;
        }

        /* Content */
        .content {
            padding: 2rem;
        }

        /* Page Header */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .btn {
            padding: 0.7rem 1.5rem;
            border-radius: 10px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: rgba(82, 183, 136, 0.8);
            color: #1B4332;
        }

        .btn-primary:hover {
            background: rgba(82, 183, 136, 1);
        }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .filter-group {
            display: flex;
            gap: 1rem;
        }

        .filter-select {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            padding: 0.6rem 1rem;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .filter-select option {
            background: #1B4332;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
        }

        .product-card {
            overflow: hidden;
            transition: transform 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-image {
            width: 100%;
            height: 150px;
            background: rgba(82, 183, 136, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #52B788;
            position: relative;
        }

        .product-badge {
            position: absolute;
            top: 0.5rem;
            left: 0.5rem;
            background: rgba(82, 183, 136, 0.9);
            color: #1B4332;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .product-badge.sale {
            background: #e74c3c;
        }

        .product-info {
            padding: 1rem;
        }

        .product-category {
            font-size: 0.75rem;
            color: #52B788;
            margin-bottom: 0.3rem;
        }

        .product-name {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-price {
            font-size: 1rem;
            font-weight: 700;
            color: #52B788;
            margin-bottom: 0.5rem;
        }

        .product-price .old-price {
            font-size: 0.75rem;
            text-decoration: line-through;
            color: rgba(255, 255, 255, 0.4);
            margin-left: 0.5rem;
        }

        .product-stock {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 0.8rem;
        }

        .stock-low {
            color: #e74c3c;
        }

        .stock-ok {
            color: #2ecc71;
        }

        .product-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-action {
            flex: 1;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
        }

        .btn-action:hover {
            background: rgba(82, 183, 136, 0.3);
            border-color: #52B788;
        }

        .btn-action.delete:hover {
            background: rgba(231, 76, 60, 0.3);
            border-color: #e74c3c;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 2rem;
        }

        .pagination-btn {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .pagination-btn:hover {
            background: rgba(82, 183, 136, 0.3);
            border-color: #52B788;
        }

        .pagination-btn.active {
            background: rgba(82, 183, 136, 0.8);
            border-color: #52B788;
            color: #1B4332;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: rgba(255, 255, 255, 0.3);
        }

        .mobile-toggle {
            display: none;
            font-size: 1.3rem;
            color: #fff;
            background: none;
            border: none;
            cursor: pointer;
        }

        @media (max-width: 1200px) {
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 992px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
            }

            .mobile-toggle {
                display: block;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }

            .search-box input {
                width: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <a href="../pelanggan/index.html" class="sidebar-logo">
                    <i class="fas fa-fish"></i>
                    BABA FARM
                </a>
            </div>

            <div class="sidebar-user">
                <div class="user-avatar">A</div>
                <div class="user-info">
                    <h4>Admin</h4>
                    <p>Super Admin</p>
                </div>
            </div>

            <nav class="sidebar-menu">
                <div class="menu-section">
                    <p class="menu-title">Utama</p>
                    <a href="dashboard.html" class="menu-item">
                        <i class="fas fa-th-large"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="artikel.html" class="menu-item">
                        <i class="fas fa-newspaper"></i>
                        <span>Kelola Artikel</span>
                    </a>
                    <a href="produk.html" class="menu-item active">
                        <i class="fas fa-box"></i>
                        <span>Kelola Produk</span>
                    </a>
                </div>

                <div class="menu-section">
                    <p class="menu-title">Transaksi</p>
                    <a href="transaksi.html" class="menu-item">
                        <i class="fas fa-shopping-cart"></i>
                        <span>Kelola Transaksi</span>
                    </a>
                </div>

                <div class="menu-section">
                    <p class="menu-title">Pengguna</p>
                    <a href="pengguna.html" class="menu-item">
                        <i class="fas fa-users"></i>
                        <span>Kelola Pengguna</span>
                    </a>
                </div>

                <div class="menu-section">
                    <p class="menu-title">Akun</p>
                    <a href="profile.html" class="menu-item">
                        <i class="fas fa-user"></i>
                        <span>Profil Saya</span>
                    </a>
                    <a href="settings.html" class="menu-item">
                        <i class="fas fa-cog"></i>
                        <span>Pengaturan</span>
                    </a>
                    <a href="../pelanggan/index.html" class="menu-item">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Keluar</span>
                    </a>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <div class="top-bar">
                <div class="page-title">
                    <button class="mobile-toggle" id="mobileToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1>Kelola Produk</h1>
                </div>
                <div class="top-bar-actions">
                    <div class="search-box">
                        <input type="text" placeholder="Cari produk..." id="searchInput">
                        <i class="fas fa-search" style="color: rgba(255,255,255,0.5);"></i>
                    </div>
                    <a href="#" class="btn-action">
                        <i class="fas fa-bell"></i>
                    </a>
                    <a href="#" class="btn-action">
                        <i class="fas fa-user"></i>
                    </a>
                </div>
            </div>

            <!-- Content -->
            <div class="content">
                <!-- Page Header -->
                <div class="page-header">
                    <h2>Daftar Produk</h2>
                    <button class="btn btn-primary" onclick="alert('Fitur tambah produk akan diimplementasikan dengan backend')">
                        <i class="fas fa-plus"></i>
                        Tambah Produk
                    </button>
                </div>

                <!-- Filter Bar -->
                <div class="filter-bar">
                    <div class="filter-group">
                        <select class="filter-select" id="categoryFilter">
                            <option value="all">Semua Kategori</option>
                            <option value="Benih">Benih</option>
                            <option value="Pakan">Pakan</option>
                            <option value="Suplemen">Suplemen</option>
                            <option value="Obat">Obat</option>
                        </select>
                        <select class="filter-select" id="stockFilter">
                            <option value="all">Semua Stok</option>
                            <option value="available">Tersedia</option>
                            <option value="low">Stok Menipis</option>
                            <option value="out">Habis</option>
                        </select>
                    </div>
                </div>

                <!-- Products Grid - Diisi dari PRODUK_DATA -->
                <div class="products-grid" id="productsGrid"></div>

                <!-- Pagination -->
                <div class="pagination">
                    <button class="pagination-btn"><i class="fas fa-chevron-left"></i></button>
                    <button class="pagination-btn active">1</button>
                    <button class="pagination-btn">2</button>
                    <button class="pagination-btn">3</button>
                    <button class="pagination-btn"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </main>
    </div>

    <!-- Load produk-data.js untuk PRODUK_DATA -->
    <script src="../js/produk-data.js"></script>

    <script>
        // ========================================
        // ICON BERDASARKAN KATEGORI
        // ========================================
        const CATEGORY_ICONS = {
            'Benih': 'fa-egg',
            'Pakan': 'fa-wheat-awn',
            'Suplemen': 'fa-flask',
            'Obat': 'fa-prescription-bottle'
        };

        // ========================================
        // RENDER PRODUK DARI PRODUK_DATA
        // ========================================
        function renderProducts() {
            const container = document.getElementById('productsGrid');

            if (!PRODUK_DATA || Object.keys(PRODUK_DATA).length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <i class="fas fa-box-open"></i>
                        <h3>Belum ada produk</h3>
                        <p>Tambahkan produk pertama Anda</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = Object.entries(PRODUK_DATA).map(([key, product]) => {
                // Tentukan stok class
                let stockClass = 'stock-ok';
                let stockLabel = `Stok: ${product.stok}`;

                if (product.stok === 0) {
                    stockClass = 'stock-low';
                    stockLabel = 'Stok: Habis';
                } else if (product.stok < 50) {
                    stockClass = 'stock-low';
                    stockLabel = `Stok: ${product.stok} (Menipis)`;
                }

                // Tentukan badge
                let badgeHTML = '';
                if (product.badge) {
                    const badgeClass = product.badge === 'Diskon' || product.badge === 'Promo' ? 'sale' : '';
                    badgeHTML = `<span class="product-badge ${badgeClass}">${product.badge}</span>`;
                }

                // Harga lama
                let priceHTML = product.harga;
                if (product.hargaLama) {
                    priceHTML = `${product.harga} <span class="old-price">${product.hargaLama}</span>`;
                }

                // Kategori lowercase untuk data attribute
                const categoryLower = product.kategori.toLowerCase();

                // Tentukan tampilan gambar atau icon fallback
                let imageHTML;
                if (product.gambar) {
                    imageHTML = `<img src="${product.gambar}" alt="${product.nama}" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"><i class="fas ${CATEGORY_ICONS[product.kategori] || 'fa-box'}" style="display: none;"></i>`;
                } else {
                    imageHTML = `<i class="fas ${CATEGORY_ICONS[product.kategori] || 'fa-box'}"></i>`;
                }

                return `
                    <div class="product-card glass" data-category="${categoryLower}" data-stock="${product.stok > 0 ? (product.stok < 50 ? 'low' : 'available') : 'out'}">
                        <div class="product-image">
                            ${imageHTML}
                            ${badgeHTML}
                        </div>
                        <div class="product-info">
                            <div class="product-category">${product.kategori}</div>
                            <div class="product-name">${product.nama}</div>
                            <div class="product-price">${priceHTML}</div>
                            <div class="product-stock ${stockClass}">${stockLabel}</div>
                            <div class="product-actions">
                                <button class="btn-action" onclick="editProduct('${key}')" title="Edit">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn-action" onclick="viewProduct('${key}')" title="Lihat">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button class="btn-action delete" onclick="deleteProduct('${key}')" title="Hapus">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ========================================
        // FUNGSI AKSI PRODUK
        // ========================================
        function editProduct(key) {
            const product = PRODUK_DATA[key];
            alert(`Edit produk: ${product.nama}\n\nFitur ini akan diimplementasikan dengan backend.`);
        }

        function viewProduct(key) {
            const product = PRODUK_DATA[key];
            alert(`Detail produk: ${product.nama}\n\nHarga: ${product.harga} ${product.satuan}\nStok: ${product.stok}\nDeskripsi: ${product.deskripsiSingkat}`);
        }

        function deleteProduct(key) {
            const product = PRODUK_DATA[key];
            if (confirm(`Apakah Anda yakin ingin menghapus "${product.nama}"?`)) {
                alert(`Produk "${product.nama}" telah dihapus (simulasi).\n\nFitur ini akan diimplementasikan dengan backend.`);
            }
        }

        // ========================================
        // FILTER FUNCTIONS
        // ========================================
        document.getElementById('categoryFilter').addEventListener('change', function() {
            const category = this.value;
            document.querySelectorAll('.product-card').forEach(card => {
                const cardCategory = card.dataset.category;
                if (category === 'all' || cardCategory === category.toLowerCase()) {
                    card.style.display = '';
                } else {
                    card.style.display = 'none';
                }
            });
        });

        document.getElementById('stockFilter').addEventListener('change', function() {
            const filter = this.value;
            document.querySelectorAll('.product-card').forEach(card => {
                const stock = card.dataset.stock;
                if (filter === 'all') {
                    card.style.display = '';
                } else if (filter === 'available' && (stock === 'available' || stock === 'low')) {
                    card.style.display = '';
                } else if (filter === 'low' && stock === 'low') {
                    card.style.display = '';
                } else if (filter === 'out' && stock === 'out') {
                    card.style.display = '';
                } else {
                    card.style.display = 'none';
                }
            });
        });

        // Search
        document.getElementById('searchInput').addEventListener('input', function() {
            const query = this.value.toLowerCase();
            document.querySelectorAll('.product-card').forEach(card => {
                const name = card.querySelector('.product-name').textContent.toLowerCase();
                if (name.includes(query)) {
                    card.style.display = '';
                } else {
                    card.style.display = 'none';
                }
            });
        });

        // ========================================
        // MOBILE TOGGLE
        // ========================================
        const mobileToggle = document.getElementById('mobileToggle');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        mobileToggle.addEventListener('click', () => {
            sidebar.classList.toggle('active');
            sidebarOverlay.classList.toggle('active');
        });

        sidebarOverlay.addEventListener('click', () => {
            sidebar.classList.remove('active');
            sidebarOverlay.classList.remove('active');
        });

        // ========================================
        // INIT
        // ========================================
        // Render produk saat halaman dimuat
        if (typeof PRODUK_DATA !== 'undefined') {
            renderProducts();
        } else {
            console.error('PRODUK_DATA tidak ditemukan. Pastikan produk-data.js sudah dimuat.');
            document.getElementById('productsGrid').innerHTML = `
                <div class="empty-state" style="grid-column: 1 / -1;">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h3>Data produk tidak dapat dimuat</h3>
                    <p>Pastikan file js/produk-data.js sudah ada</p>
                </div>
            `;
        }
    </script>
    <script src="../js/admin/common.js"></script>
</body>
</html>
